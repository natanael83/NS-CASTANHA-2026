name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: Sync Capacitor
        run: |
          npx cap sync android --verbose > sync_cap.log 2>&1 || true
          curl --upload-file sync_cap.log https://transfer.sh/nsk-debug-sync.log || true
        continue-on-error: true

      - name: Build APK
        working-directory: ./android
        run: |
          ./gradlew assembleDebug > ../build_apk.log 2>&1 || true
          curl --upload-file ../build_apk.log https://transfer.sh/nsk-debug-apk.log || true
        continue-on-error: true

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-logs
          path: |
            sync_cap.log
            android/build_apk.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk 
